name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate CI keystore
        run: |
          keytool -genkey -v -keystore app/ci.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          echo "KEYSTORE_PATH=ci.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android" >> $GITHUB_ENV

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ci.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ci.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
