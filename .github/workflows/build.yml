name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Release signing:
#   Provide these repository secrets ONCE (generate the keystore locally a single time):
#     RELEASE_KEYSTORE_BASE64  - `base64 -w0 release.keystore`
#     RELEASE_KEYSTORE_PASSWORD
#     RELEASE_KEY_ALIAS
#     RELEASE_KEY_PASSWORD
#   When the secret is absent the release APK is simply left unsigned (build.gradle.kts already
#   falls back to "unsigned" rather than to a public debug key) - it is NEVER re-generated on the
#   fly, so update-in-place of an installed release keeps working (stable signing identity).

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        id: keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "keystore_path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          # Empty when no keystore secret is set -> build.gradle.kts leaves the release unsigned
          # instead of signing with a throwaway/public key.
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
